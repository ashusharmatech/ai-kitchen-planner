# Render Blueprint
# Each service uses rootDir to set the build context to its own folder.
# Render then finds Dockerfile inside that folder automatically.

services:

  - type: web
    name: kitchen-api-gateway
    runtime: docker
    rootDir: services/api-gateway
    plan: free
    envVars:
      - key: HOUSEHOLD_SVC_URL
        value: https://kitchen-household-svc.onrender.com
      - key: PLANNER_SVC_URL
        value: https://kitchen-planner-svc.onrender.com
      - key: TRANSLATION_SVC_URL
        value: https://kitchen-translation-svc.onrender.com
      - key: FEEDBACK_SVC_URL
        value: https://kitchen-feedback-svc.onrender.com

  - type: web
    name: kitchen-household-svc
    runtime: docker
    rootDir: services/household-service
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: web
    name: kitchen-planner-svc
    runtime: docker
    rootDir: services/planner-service
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HOUSEHOLD_SVC_URL
        value: https://kitchen-household-svc.onrender.com
      - key: TRANSLATION_SVC_URL
        value: https://kitchen-translation-svc.onrender.com
      - key: REDIS_URL
        fromService:
          name: kitchen-redis
          type: redis
          property: connectionString

  - type: web
    name: kitchen-translation-svc
    runtime: docker
    rootDir: services/translation-service
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: kitchen-feedback-svc
    runtime: docker
    rootDir: services/feedback-service
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    name: kitchen-morning-scheduler
    runtime: docker
    rootDir: services/scheduler-service
    schedule: "30 0 * * *"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PLANNER_SVC_URL
        value: https://kitchen-planner-svc.onrender.com
      - key: HOUSEHOLD_SVC_URL
        value: https://kitchen-household-svc.onrender.com

  - type: redis
    name: kitchen-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
