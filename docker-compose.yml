version: "3.9"
services:

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  household-service:
    build: ./services/household-service
    ports: ["8001:8001"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}

  translation-service:
    build: ./services/translation-service
    ports: ["8003:8003"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  feedback-service:
    build: ./services/feedback-service
    ports: ["8004:8004"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}

  planner-service:
    build: ./services/planner-service
    ports: ["8002:8002"]
    depends_on: [redis, household-service, translation-service]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HOUSEHOLD_SVC_URL: http://household-service:8001
      TRANSLATION_SVC_URL: http://translation-service:8003
      REDIS_URL: redis://redis:6379

  api-gateway:
    build: ./services/api-gateway
    ports: ["8000:8000"]
    depends_on: [household-service, planner-service, translation-service, feedback-service]
    environment:
      HOUSEHOLD_SVC_URL:   http://household-service:8001
      PLANNER_SVC_URL:     http://planner-service:8002
      TRANSLATION_SVC_URL: http://translation-service:8003
      FEEDBACK_SVC_URL:    http://feedback-service:8004
