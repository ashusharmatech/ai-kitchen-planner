apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
- ../../base
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: api-gateway
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: planner-service
images:
- name: gcr.io/YOUR_GCP_PROJECT_ID/api-gateway
  newTag: "prod"
- name: gcr.io/YOUR_GCP_PROJECT_ID/household-service
  newTag: "prod"
- name: gcr.io/YOUR_GCP_PROJECT_ID/planner-service
  newTag: "prod"
- name: gcr.io/YOUR_GCP_PROJECT_ID/translation-service
  newTag: "prod"
- name: gcr.io/YOUR_GCP_PROJECT_ID/feedback-service
  newTag: "prod"
- name: gcr.io/YOUR_GCP_PROJECT_ID/scheduler-service
  newTag: "prod"
