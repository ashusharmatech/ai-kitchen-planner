apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kitchen-planner-ingress
  namespace: kitchen-planner
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "kitchen-planner-ip"
    networking.gke.io/managed-certificates: "kitchen-planner-cert"
spec:
  rules:
  - host: kitchen.yourdomain.com
    http:
      paths:
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
